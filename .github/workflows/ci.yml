name: CI

on:
  push:
    paths:
      - '**/*.py'
      - '**/pyproject.toml'
      - '**/requirements.txt'
      - '**/uv.lock'
      - 'bootstrap/**'
      - 'install.sh'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - '**/*.py'
      - '**/pyproject.toml'
      - '**/requirements.txt'
      - '**/uv.lock'
      - 'bootstrap/**'
      - 'install.sh'
      - '.github/workflows/ci.yml'

jobs:
  ansible-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ansible-lint
        run: pip install ansible-lint==26.4.0
      - name: Install community.general collection
        run: ansible-galaxy collection install community.general
      - name: Run ansible-lint
        run: ansible-lint
        working-directory: bootstrap

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck on install.sh
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          additional_files: 'install.sh bootstrap/run.sh'

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Run tests
        run: |
          cd stapler-scripts/slack-emoji-export
          uv run pytest test_extract_slack_emoji.py
      - name: Run ruff
        run: |
          cd stapler-scripts/slack-emoji-export
          uv run ruff check .
      - name: Run mypy
        run: |
          cd stapler-scripts/slack-emoji-export
          uv run mypy .
