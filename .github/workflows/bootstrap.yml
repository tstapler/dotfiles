name: Bootstrap

on:
  push:
    branches: [master]
    paths:
      - 'bootstrap/**'
      - 'Brewfile.test'
      - '.github/workflows/bootstrap.yml'
  pull_request:
    paths:
      - 'bootstrap/**'
      - 'Brewfile.test'
      - '.github/workflows/bootstrap.yml'

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible
        run: brew install ansible

      - name: Run bootstrap (homebrew only)
        run: |
          cd bootstrap
          ansible-playbook playbook.yml \
            -e "dotfiles_dir=$GITHUB_WORKSPACE" \
            -e "brewfile=Brewfile.test" \
            --tags homebrew \
            --connection=local \
            -v

      - name: Verify key tools installed
        run: |
          brew list git
          brew list gh
          brew list jq
