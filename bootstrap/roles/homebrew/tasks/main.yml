---
- name: Install Linux prerequisites (Debian/Ubuntu)
  apt:
    name:
      - build-essential
      - curl
      - file
      - git
    state: present
    update_cache: true
  become: true
  when: ansible_os_family == "Debian"
  tags: [homebrew]

- name: Install Linux prerequisites (Arch/Manjaro)
  pacman:
    name:
      - base-devel
      - curl
      - file
      - git
    state: present
  become: true
  when: ansible_os_family == "Archlinux"
  tags: [homebrew]

- name: Check Homebrew is installed
  stat:
    path: "{{ brew_prefix }}/bin/brew"
  register: homebrew_brew_bin
  tags: [homebrew]

- name: Install Homebrew
  shell: /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
  when: not homebrew_brew_bin.stat.exists
  tags: [homebrew]

- name: Update Homebrew
  command: "{{ brew_prefix }}/bin/brew update"
  changed_when: false
  environment:
    PATH: "{{ brew_prefix }}/bin:{{ ansible_env.PATH }}"
  tags: [homebrew]

- name: Set brewfile path
  set_fact:
    homebrew_brewfile_path: "{{ dotfiles_dir }}/{{ 'Brewfile' if ansible_os_family == 'Darwin' else 'Brewfile.linux' }}"
  tags: [homebrew]

- name: Trust all taps in Brewfile (Homebrew 4.x security model)
  shell: |
    {
      grep '^tap ' {{ homebrew_brewfile_path }} | awk '{print $2}' | tr -d '"'
      grep -E '^(brew|cask) ' {{ homebrew_brewfile_path }} | awk '{print $2}' | tr -d '"' | \
        grep -E '^[^/]+/[^/]+/[^/]+' | awk -F'/' '{print $1 "/" $2}'
    } | sort -u | while read -r tap; do
      {{ brew_prefix }}/bin/brew trust --tap "$tap" 2>/dev/null || true
    done
  changed_when: false
  environment:
    PATH: "{{ brew_prefix }}/bin:{{ ansible_env.PATH }}"
  tags: [homebrew]

- name: Add all taps from Brewfile
  shell: |
    grep '^tap ' {{ homebrew_brewfile_path }} | awk '{print $2}' | tr -d '"' | \
    while read -r tap; do
      {{ brew_prefix }}/bin/brew tap "$tap" 2>/dev/null || true
    done
  changed_when: false
  environment:
    PATH: "{{ brew_prefix }}/bin:{{ ansible_env.PATH }}"
    GIT_TERMINAL_PROMPT: "0"
    GIT_CONFIG_COUNT: "1"
    GIT_CONFIG_KEY_0: "credential.helper"
    GIT_CONFIG_VALUE_0: ""
  tags: [homebrew]

- name: Check if all Brewfile packages are already installed
  command: >
    {{ brew_prefix }}/bin/brew bundle check
    --file={{ homebrew_brewfile_path }}
  register: homebrew_bundle_check
  failed_when: false
  changed_when: false
  environment:
    PATH: "{{ brew_prefix }}/bin:{{ ansible_env.PATH }}"
  tags: [homebrew]

- name: Install packages from Brewfile
  command: >
    {{ brew_prefix }}/bin/brew bundle install
    --file={{ homebrew_brewfile_path }}
    --no-upgrade
  register: homebrew_brew_bundle
  changed_when: "'Installing' in homebrew_brew_bundle.stdout"
  when: homebrew_bundle_check.rc != 0
  environment:
    PATH: "{{ brew_prefix }}/bin:{{ ansible_env.PATH }}"
    GIT_TERMINAL_PROMPT: "0"
    GIT_CONFIG_COUNT: "1"
    GIT_CONFIG_KEY_0: "credential.helper"
    GIT_CONFIG_VALUE_0: ""
  tags: [homebrew]

- name: Symlink gdu-go to gdu (Homebrew renames it to avoid coreutils conflict)
  file:
    src: "{{ brew_prefix }}/bin/gdu-go"
    dest: "{{ brew_prefix }}/bin/gdu"
    state: link
  tags: [homebrew]
