---
# FBG-specific bootstrap: SSH config, host keys, then delegates to private repo.
# Run with: ansible-playbook playbook.yml --tags fbg
# Requires: personal SSH key at {{ fbg_personal_ssh_key }} with github.com access.

- name: Ensure ~/.ssh and ~/.ssh/config.d exist
  file:
    path: "{{ item }}"
    state: directory
    mode: '0700'
  loop:
    - "{{ ansible_env.HOME }}/.ssh"
    - "{{ ansible_env.HOME }}/.ssh/config.d"
  tags: [fbg]

- name: Write github-personal SSH host alias
  copy:
    dest: "{{ ansible_env.HOME }}/.ssh/config.d/github-personal"
    mode: '0600'
    content: |
      Host github-personal
        HostName github.com
        User git
        IdentityFile {{ fbg_personal_ssh_key }}
        IdentitiesOnly yes
  vars:
    fbg_personal_ssh_key: "{{ ansible_env.HOME }}/.ssh/id_ed25519_personal"
  tags: [fbg]

- name: Ensure ~/.ssh/config includes config.d
  blockinfile:
    path: "{{ ansible_env.HOME }}/.ssh/config"
    create: true
    mode: '0600'
    marker: "# {mark} ANSIBLE MANAGED — config.d include"
    block: |
      Include ~/.ssh/config.d/*
    insertbefore: BOF
  tags: [fbg]

- name: Ensure github.com key present in known_hosts
  shell: |
    ssh-keygen -F github.com -f "{{ ansible_env.HOME }}/.ssh/known_hosts" > /dev/null 2>&1 || \
    ssh-keyscan -H github.com >> "{{ ansible_env.HOME }}/.ssh/known_hosts"
  changed_when: false
  tags: [fbg]

- name: Ensure ~/IdeaProjects exists
  file:
    path: "{{ ansible_env.HOME }}/IdeaProjects"
    state: directory
    mode: '0755'
  tags: [fbg]

- name: Clone private FBG dotfiles
  git:
    repo: git@github.com:TylerStaplerAtFanatics/dotfiles-fbg.git
    dest: "{{ ansible_env.HOME }}/IdeaProjects/dotfiles-fbg"
    update: true
  environment:
    GIT_SSH_COMMAND: "ssh -o StrictHostKeyChecking=accept-new"
  tags: [fbg]

- name: Run FBG-specific tasks
  include_tasks: "{{ ansible_env.HOME }}/IdeaProjects/dotfiles-fbg/tasks/main.yml"
  vars:
    fbg_dotfiles_dir: "{{ ansible_env.HOME }}/IdeaProjects/dotfiles-fbg"
  tags: [fbg]
