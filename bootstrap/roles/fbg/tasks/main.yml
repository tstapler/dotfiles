---
# FBG-specific bootstrap. The generic `github` role (which runs first, and is
# also tagged `fbg`) generates + registers the SSH keys and authenticates gh.
# This role only wires up the FBG-specific pieces: the SSH host aliases, the
# work git identity, and the private dotfiles-fbg repo.
#
# Key / identity model:
#   - github.com      -> primary key (github_primary_key), work account.
#                        Default host, so git@github.com:... uses the work key.
#   - github-personal -> personal key (github_personal_key), personal account.
#                        Personal repos use git@github-personal:... (or HTTPS+gh).
#   - repos under ~/WorkProjects use the work email via ~/.gitconfig.fbg
#     (pulled in by the includeIf in the main ~/.gitconfig).
#
# Run with: ansible-playbook playbook.yml --tags fbg

- name: Define FBG identity facts
  set_fact:
    fbg_git_name: "Tyler Stapler"
    fbg_work_email: "Tyler.Stapler@betfanatics.com"
  tags: [fbg]

- name: Ensure ~/.ssh/config.d exists
  file:
    path: "{{ ansible_facts['env']['HOME'] }}/.ssh/config.d"
    state: directory
    mode: '0700'
  tags: [fbg]

- name: Write SSH host aliases (github.com = work, github-personal = personal)
  copy:
    dest: "{{ ansible_facts['env']['HOME'] }}/.ssh/config.d/github"
    mode: '0600'
    content: |
      # Work account is the default for github.com.
      Host github.com
        HostName github.com
        User git
        IdentityFile {{ github_primary_key }}
        IdentitiesOnly yes

      # Personal account, selected by using github-personal in the remote URL.
      Host github-personal
        HostName github.com
        User git
        IdentityFile {{ github_personal_key }}
        IdentitiesOnly yes
  tags: [fbg]

- name: Remove superseded github-personal alias file
  file:
    path: "{{ ansible_facts['env']['HOME'] }}/.ssh/config.d/github-personal"
    state: absent
  tags: [fbg]

- name: Ensure ~/.ssh/config includes config.d
  blockinfile:
    path: "{{ ansible_facts['env']['HOME'] }}/.ssh/config"
    create: true
    mode: '0600'
    marker: "# {mark} ANSIBLE MANAGED — config.d include"
    block: |
      Include ~/.ssh/config.d/*
    insertbefore: BOF
  tags: [fbg]

- name: Write work git identity (included for repos under ~/WorkProjects)
  copy:
    dest: "{{ ansible_facts['env']['HOME'] }}/.gitconfig.fbg"
    mode: '0644'
    content: |
      # Managed by the fbg Ansible role. Applied to ~/WorkProjects/* via the
      # includeIf in the main ~/.gitconfig.
      [user]
          name = {{ fbg_git_name }}
          email = {{ fbg_work_email }}
  tags: [fbg]

- name: Ensure ~/WorkProjects exists
  file:
    path: "{{ ansible_facts['env']['HOME'] }}/WorkProjects"
    state: directory
    mode: '0755'
  tags: [fbg]

- name: Check work SSH access to github.com
  command: ssh -T -o BatchMode=yes -o StrictHostKeyChecking=accept-new git@github.com
  register: fbg_work_ssh_auth
  failed_when: false
  changed_when: false
  tags: [fbg]

- name: Note if work SSH access is not active yet
  debug:
    msg: |
      Work SSH access to github.com is not active yet — the private dotfiles-fbg
      repo was not cloned. Ensure the github role registered the primary key with
      the work account (set github_op_token_path or authenticate gh), then re-run:
      ansible-playbook playbook.yml --tags fbg
  when: "'successfully authenticated' not in fbg_work_ssh_auth.stderr"
  tags: [fbg]

- name: Clone private FBG dotfiles
  git:
    repo: git@github.com:TylerStaplerAtFanatics/dotfiles-fbg.git
    dest: "{{ ansible_facts['env']['HOME'] }}/WorkProjects/dotfiles-fbg"
    update: true
  environment:
    GIT_SSH_COMMAND: "ssh -o StrictHostKeyChecking=accept-new"
  when: "'successfully authenticated' in fbg_work_ssh_auth.stderr"
  tags: [fbg]

- name: Run FBG-specific tasks
  include_tasks: "{{ ansible_facts['env']['HOME'] }}/WorkProjects/dotfiles-fbg/tasks/main.yml"
  vars:
    fbg_dotfiles_dir: "{{ ansible_facts['env']['HOME'] }}/WorkProjects/dotfiles-fbg"
  when: "'successfully authenticated' in fbg_work_ssh_auth.stderr"
  tags: [fbg]
