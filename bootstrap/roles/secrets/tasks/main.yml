---
- name: Check 1Password CLI is installed
  command: which op
  register: op_installed
  failed_when: false
  changed_when: false

- name: Fail with helpful message if op missing
  fail:
    msg: "1Password CLI (op) not found. It should be in your Brewfile — run the homebrew role first."
  when: op_installed.rc != 0

- name: Check 1Password account is signed in
  command: op account list
  register: op_signed_in
  failed_when: false
  changed_when: false

- name: Print sign-in instructions if not authenticated
  debug:
    msg: |
      1Password not signed in. After playbook completes, run:
        eval $(op signin)
      Then open a new terminal — secrets will inject automatically via local.sh.
  when: op_signed_in.rc != 0

- name: Test secret injection (dry run)
  command: op inject -i {{ dotfiles_dir }}/.shell/secrets.op.sh.tpl --dry-run
  register: op_inject_test
  failed_when: false
  changed_when: false
  when: op_signed_in.rc == 0

- name: Report injection status
  debug:
    msg: "Secret injection: {{ 'OK' if op_inject_test.rc == 0 else 'FAILED — check op:// vault references' }}"
  when: op_signed_in.rc == 0
