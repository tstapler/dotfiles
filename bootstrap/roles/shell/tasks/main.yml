---
- name: Set zsh as default shell
  user:
    name: "{{ ansible_facts['env']['USER'] }}"
    shell: /bin/zsh
  become: true
  when: ansible_facts['env']['SHELL'] != '/bin/zsh'
  tags: [shell]

- name: Clone zplug if missing
  git:
    repo: https://github.com/tstapler/zplug
    dest: "{{ ansible_facts['env']['HOME'] }}/.zplug"
    update: false
  tags: [shell]
