---
# ── SSH directory ─────────────────────────────────────────────────────────

- name: Ensure ~/.ssh has correct permissions
  file:
    path: "{{ ansible_facts['env']['HOME'] }}/.ssh"
    state: directory
    mode: '0700'
  tags: [github]

- name: Seed github.com into known_hosts
  shell: |
    ssh-keygen -F github.com -f "{{ ansible_facts['env']['HOME'] }}/.ssh/known_hosts" > /dev/null 2>&1 || \
    ssh-keyscan -H github.com >> "{{ ansible_facts['env']['HOME'] }}/.ssh/known_hosts"
  changed_when: false
  tags: [github]

# ── Key generation ────────────────────────────────────────────────────────

- name: Generate primary ed25519 keypair
  command: >
    ssh-keygen -t ed25519
    -f {{ github_primary_key }}
    -N ""
    -C "{{ github_key_comment }}"
  args:
    creates: "{{ github_primary_key }}"
  tags: [github]

- name: Generate personal ed25519 keypair
  command: >
    ssh-keygen -t ed25519
    -f {{ github_personal_key }}
    -N ""
    -C "personal-{{ github_key_comment }}"
  args:
    creates: "{{ github_personal_key }}"
  when: github_personal_user != ""
  tags: [github]

# ── gh CLI authentication — primary account ───────────────────────────────

- name: Check primary GitHub authentication
  command: gh auth status
  register: github_auth
  failed_when: false
  changed_when: false
  environment:
    PATH: "{{ brew_prefix }}/bin:{{ ansible_facts['env']['PATH'] }}"
  tags: [github]

- name: Authenticate primary account via 1Password
  shell: op read "{{ github_op_token_path }}" | gh auth login --with-token
  when:
    - github_auth.rc != 0
    - github_op_token_path != ""
  environment:
    PATH: "{{ brew_prefix }}/bin:{{ ansible_facts['env']['PATH'] }}"
  tags: [github]

- name: Require primary gh authentication
  fail:
    msg: |
      GitHub CLI is not authenticated and github_op_token_path is not set.
      Either run:
        gh auth login
      or set github_op_token_path to your 1Password token path (e.g. op://Personal/GitHub/token)
      then re-run the playbook.
  when:
    - github_auth.rc != 0
    - github_op_token_path == ""
  tags: [github]

# ── gh CLI authentication — personal account (FBG) ───────────────────────

- name: Check personal GitHub account token
  command: gh auth token --user {{ github_personal_user }}
  register: github_personal_token
  failed_when: false
  changed_when: false
  when: github_personal_user != ""
  environment:
    PATH: "{{ brew_prefix }}/bin:{{ ansible_facts['env']['PATH'] }}"
  tags: [github]

- name: Authenticate personal account via 1Password
  shell: op read "{{ github_personal_op_token_path }}" | gh auth login --with-token
  when:
    - github_personal_user != ""
    - github_personal_token.rc != 0
    - github_personal_op_token_path != ""
  environment:
    PATH: "{{ brew_prefix }}/bin:{{ ansible_facts['env']['PATH'] }}"
  tags: [github]

- name: Require personal gh authentication
  fail:
    msg: |
      Personal GitHub account '{{ github_personal_user }}' is not authenticated
      and github_personal_op_token_path is not set.
      Either run:
        gh auth login
      and sign in with your personal account, or set github_personal_op_token_path
      (e.g. op://Personal/GitHub Personal/token) then re-run the playbook.
  when:
    - github_personal_user != ""
    - github_personal_token.rc != 0
    - github_personal_op_token_path == ""
  tags: [github]

# ── SSH key registration ───────────────────────────────────────────────────

- name: Register primary key with primary GitHub account
  command: >
    gh ssh-key add {{ github_primary_key }}.pub
    --title "{{ ansible_facts['hostname'] }}-primary"
  register: github_add_primary
  changed_when: github_add_primary.rc == 0
  failed_when: >
    github_add_primary.rc != 0 and
    'already' not in (github_add_primary.stderr | lower) and
    'already' not in (github_add_primary.stdout | lower) and
    'admin:public_key' not in github_add_primary.stderr
  environment:
    PATH: "{{ brew_prefix }}/bin:{{ ansible_facts['env']['PATH'] }}"
  tags: [github]

- name: Fail with instructions if primary token lacks admin:public_key scope
  fail:
    msg: |
      gh CLI token for the primary account is missing the "admin:public_key"
      scope needed to register SSH keys.
      Grant it: gh auth refresh -h github.com -s admin:public_key
      Then re-run: ansible-playbook bootstrap/playbook.yml --tags github
  when: "'admin:public_key' in (github_add_primary.stderr | default(''))"
  tags: [github]

- name: Re-fetch personal token after authentication
  command: gh auth token --user {{ github_personal_user }}
  register: github_personal_token
  changed_when: false
  when: github_personal_user != ""
  environment:
    PATH: "{{ brew_prefix }}/bin:{{ ansible_facts['env']['PATH'] }}"
  tags: [github]

- name: Register personal ed25519 key with personal GitHub account
  command: >
    gh ssh-key add {{ github_personal_key }}.pub
    --title "{{ ansible_facts['hostname'] }}-personal"
  register: github_add_personal
  changed_when: github_add_personal.rc == 0
  failed_when: >
    github_add_personal.rc != 0 and
    'already' not in (github_add_personal.stderr | lower) and
    'already' not in (github_add_personal.stdout | lower) and
    'admin:public_key' not in github_add_personal.stderr
  when: github_personal_user != ""
  environment:
    PATH: "{{ brew_prefix }}/bin:{{ ansible_facts['env']['PATH'] }}"
    GH_TOKEN: "{{ github_personal_token.stdout | trim }}"
  tags: [github]

- name: Fail with instructions if personal token lacks admin:public_key scope
  fail:
    msg: |
      gh CLI token for personal account '{{ github_personal_user }}' is missing
      the "admin:public_key" scope needed to register SSH keys.
      If it's a `gh auth login` account: gh auth switch --user {{ github_personal_user }} && gh auth refresh -h github.com -s admin:public_key
      If it's sourced from github_personal_op_token_path: reissue that PAT with the admin:public_key scope.
      Then re-run: ansible-playbook bootstrap/playbook.yml --tags github
  when: "'admin:public_key' in (github_add_personal.stderr | default(''))"
  tags: [github]
