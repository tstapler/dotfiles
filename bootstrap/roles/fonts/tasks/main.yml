---
- name: Skip fonts on WSL2
  debug:
    msg: "Skipping fonts role on WSL2 — install Nerd Fonts on Windows side manually."
  when: is_wsl | default(false)
  tags: [fonts]

- name: Install Meslo Nerd Font (macOS via Homebrew cask)
  community.general.homebrew_cask:
    name: font-meslo-lg-nerd-font
    state: present
  when: ansible_facts['os_family'] == "Darwin" and not (is_wsl | default(false))
  environment:
    PATH: "{{ brew_prefix }}/bin:{{ ansible_facts['env']['PATH'] }}"
  tags: [fonts]

- name: Ensure fonts directory exists (Linux)
  file:
    path: "{{ ansible_facts['env']['HOME'] }}/.local/share/fonts"
    state: directory
    mode: '0755'
  when: ansible_facts['os_family'] != "Darwin" and not (is_wsl | default(false))
  tags: [fonts]

- name: Check if Meslo Nerd Font is already installed (Linux)
  find:
    paths: "{{ ansible_facts['env']['HOME'] }}/.local/share/fonts/"
    patterns: "MesloLG*"
  register: fonts_meslo_font_files
  when: ansible_facts['os_family'] != "Darwin" and not (is_wsl | default(false))
  tags: [fonts]

- name: Download Meslo Nerd Font zip (Linux)
  get_url:
    url: "https://github.com/ryanoasis/nerd-fonts/releases/latest/download/Meslo.zip"
    dest: "/tmp/Meslo.zip"
    force: false
    mode: '0644'
  when: ansible_facts['os_family'] != "Darwin" and not (is_wsl | default(false)) and fonts_meslo_font_files.matched == 0
  tags: [fonts]

- name: Unzip Meslo Nerd Font (Linux)
  unarchive:
    src: "/tmp/Meslo.zip"
    dest: "{{ ansible_facts['env']['HOME'] }}/.local/share/fonts/"
    remote_src: true
  when: ansible_facts['os_family'] != "Darwin" and not (is_wsl | default(false)) and fonts_meslo_font_files.matched == 0
  tags: [fonts]

- name: Refresh font cache (Linux)
  command: fc-cache -fv
  register: fonts_cache_refresh
  retries: 2
  delay: 2
  until: fonts_cache_refresh.rc == 0
  changed_when: false
  failed_when: false
  when: ansible_facts['os_family'] != "Darwin" and not (is_wsl | default(false))
  tags: [fonts]

- name: Warn if font cache refresh still failed after retries
  debug:
    msg: >-
      fc-cache failed after retries — non-fatal, fontconfig falls back to
      scanning directories directly and the cache rebuilds lazily on next use.
      stderr: {{ fonts_cache_refresh.stderr }}
  when: fonts_cache_refresh.rc is defined and fonts_cache_refresh.rc != 0
  tags: [fonts]
