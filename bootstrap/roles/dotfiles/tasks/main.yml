---
- name: Check if uv is available
  command: which uv
  register: dotfiles_uv_check
  failed_when: false
  changed_when: false
  environment:
    PATH: "{{ brew_prefix }}/bin:{{ ansible_facts['env']['HOME'] }}/.local/bin:{{ ansible_facts['env']['PATH'] }}"
  tags: [dotfiles]

- name: Install uv via Homebrew if not found
  command: "{{ brew_prefix }}/bin/brew install uv"
  when: dotfiles_uv_check.rc != 0
  environment:
    PATH: "{{ brew_prefix }}/bin:{{ ansible_facts['env']['PATH'] }}"
  tags: [dotfiles]

- name: Install/upgrade cfgcaddy via uv tool install
  # --force is idempotent and ensures version bumps in cfgcaddy/ are picked
  # up even when an older copy is already installed.
  command: "{{ brew_prefix }}/bin/uv tool install --force {{ dotfiles_dir }}/cfgcaddy"
  register: dotfiles_cfgcaddy_install
  changed_when: "'Installed' in dotfiles_cfgcaddy_install.stderr or 'Installed' in dotfiles_cfgcaddy_install.stdout"
  environment:
    PATH: "{{ ansible_facts['env']['HOME'] }}/.local/bin:{{ brew_prefix }}/bin:{{ ansible_facts['env']['HOME'] }}/.asdf/bin:{{ ansible_facts['env']['HOME'] }}/.asdf/shims:/opt/homebrew/bin:/home/linuxbrew/.linuxbrew/bin:{{ ansible_facts['env']['PATH'] }}"
  tags: [dotfiles]

- name: Check if ~/.cfgcaddy.yml exists (init already done)
  stat:
    path: "{{ ansible_facts['env']['HOME'] }}/.cfgcaddy.yml"
  register: dotfiles_cfgcaddy_yml
  tags: [dotfiles]

- name: Init cfgcaddy (symlinks .cfgcaddy.yml to ~/.cfgcaddy.yml)
  command: "cfgcaddy init {{ dotfiles_dir }} {{ ansible_facts['env']['HOME'] }}"
  when: not dotfiles_cfgcaddy_yml.stat.exists
  environment:
    PATH: "{{ ansible_facts['env']['HOME'] }}/.local/bin:{{ brew_prefix }}/bin:{{ ansible_facts['env']['HOME'] }}/.asdf/bin:{{ ansible_facts['env']['HOME'] }}/.asdf/shims:/opt/homebrew/bin:/home/linuxbrew/.linuxbrew/bin:{{ ansible_facts['env']['PATH'] }}"
  tags: [dotfiles]

- name: Link dotfiles via cfgcaddy
  command: cfgcaddy link -y
  register: dotfiles_cfgcaddy_result
  changed_when: "'Linked' in dotfiles_cfgcaddy_result.stdout"
  environment:
    PATH: "{{ ansible_facts['env']['HOME'] }}/.local/bin:{{ brew_prefix }}/bin:{{ ansible_facts['env']['HOME'] }}/.asdf/bin:{{ ansible_facts['env']['HOME'] }}/.asdf/shims:/opt/homebrew/bin:/home/linuxbrew/.linuxbrew/bin:{{ ansible_facts['env']['PATH'] }}"
  tags: [dotfiles]
