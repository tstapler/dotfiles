---
- name: Check .tool-versions exists
  stat:
    path: "{{ dotfiles_dir }}/.tool-versions"
  register: asdf_tool_versions_file
  tags: [asdf]

- name: Read tool names from .tool-versions
  shell: "awk '{print $1}' {{ dotfiles_dir }}/.tool-versions"
  register: asdf_tool_names
  changed_when: false
  when: asdf_tool_versions_file.stat.exists
  tags: [asdf]

- name: Add asdf plugins
  shell: |
    ASDF_SH="{{ brew_prefix }}/opt/asdf/libexec/asdf.sh"
    [ -f "$ASDF_SH" ] || ASDF_SH="{{ ansible_facts['env']['HOME'] }}/.asdf/asdf.sh"
    . "$ASDF_SH"
    asdf plugin add {{ item }}
  args:
    executable: /bin/bash
  register: asdf_plugin_result
  failed_when: >
    asdf_plugin_result.rc != 0 and
    'already added' not in asdf_plugin_result.stderr and
    'not found in repository' not in asdf_plugin_result.stderr
  changed_when: asdf_plugin_result.rc == 0
  loop: "{{ asdf_tool_names.stdout_lines | default([]) }}"
  when: asdf_tool_versions_file.stat.exists
  environment:
    PATH: "{{ ansible_facts['env']['HOME'] }}/.asdf/bin:{{ ansible_facts['env']['HOME'] }}/.asdf/shims:{{ brew_prefix }}/bin:{{ ansible_facts['env']['PATH'] }}"
  tags: [asdf]

- name: Install asdf tool versions
  shell: |
    ASDF_SH="{{ brew_prefix }}/opt/asdf/libexec/asdf.sh"
    [ -f "$ASDF_SH" ] || ASDF_SH="{{ ansible_facts['env']['HOME'] }}/.asdf/asdf.sh"
    . "$ASDF_SH"
    asdf install
  args:
    chdir: "{{ dotfiles_dir }}"
    executable: /bin/bash
  when: asdf_tool_versions_file.stat.exists
  environment:
    PATH: "{{ ansible_facts['env']['HOME'] }}/.asdf/bin:{{ ansible_facts['env']['HOME'] }}/.asdf/shims:{{ brew_prefix }}/bin:{{ ansible_facts['env']['PATH'] }}"
  tags: [asdf]
